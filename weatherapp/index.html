<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<meta name= "viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="theme-color" content="#2563eb" />
	<title>Weather Now PWA,</title>
	<link rel="manifest" href="mainfest.webmanifest" />
	<link rel="stylesheet" href="css/stayle.css" />
	<link href="style.css" rel="stylesheet" type="text/css">
</head
	<body>
	<header class="site-header">
		<h1>Weather Now</h1>
		<p>A simple beginner-friendly weather PWA</p>
	</header>
	
	<main class="container">
	<section class="card controls">
		<h2>Choose a City</h2>
		<label for="citySelect">Select a location:</label>
		<select id="citySelect">
			<option value="36.9685, -86.4808">Bowling Green, KY</option>
			<option value="38.2527, -85.7585">Louisville, KY</option>
			<option value="36.5, -86.7816">Nashville, TN</option>
			<option value="40.7128, -74.0060">New York, NY</option>
			<option value="34.0522, -118.2437">Los Angeles, CA</option>
		</select>
		<button id="loadWeatherBtn">Load Weather</button>
		</section>
		
		<section class="card weather-card">
		<h2>Current Forecast</h2>
		<div id="statusMessage">Select a city and load the weather.</div>
		<div id="weatherResult" calss="weather-result"hidden>
			<p><strong>Temperature:</strong> <span id="temp"></span>*F</p>
			<p><strong>Wind Speed:</strong> <span id="wind"></span>mph</p>
			<p><strong>Weather Code:</strong> <span id="cdoe"></span></p>
			<p><strong>Time:</strong> <span id="time"></span></p>
			</div>
		</section>
	</main>
	
	<script src="js/app.js"></script>
	</body>
</html>
